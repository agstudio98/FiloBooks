<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Tickets - FiloBook's</title>
</head>
<body>
   <nav>
        <div class="nav-container">
            <h1 class="brand"><a href="../index.html">FiloBook's</a></h1>
            <div class="nav-links">
                <a href="asistencia.html" class="back-link">Volver</a>
            </div>
        </div>
   </nav>

    <main class="main-content">
        <div class="ticket-container">
            <h2 class="logo-text" style="color: #000; font-size: 2.2rem; margin-bottom: 5px;">Mis Tickets</h2>
            <p style="color: #666;">Ingresa el código de seguimiento de tu consulta técnica.</p>
            
            <form class="ticket-search-box" onsubmit="event.preventDefault();">
                <input type="text" placeholder="Ej: #FB-12345" required>
                <button type="submit">Buscar</button>
            </form>
 
            <div class="ticket-card">
                <h4 style="font-size: 16px; font-weight: 600; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px;">Detalles de Consulta</h4>
                <p style="color: #555; margin-bottom: 15px;">Introduce un ID válido en el buscador superior para ver el progreso del ticket en tiempo real.</p>
                <p><strong>Estado del Caso:</strong></p>
                <span class="ticket-status-badge">No ingresado</span>
            </div>
        </div>
    </main>

   <footer class="footer"><p> Ag Studio 2023 </p></footer>
</body>
</html>
